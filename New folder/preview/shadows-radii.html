<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; }
  .row { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:#18181b; border:1px solid rgba(255,255,255,0.08); }
  .shadow-card { box-shadow:0 10px 30px rgba(0,0,0,0.2); }
  .shadow-hover { box-shadow:0 15px 35px rgba(0,0,0,0.3); }
  .shadow-btn   { box-shadow:0 4px 15px rgba(124,58,237,0.4); }
  .label { font-size:10px; color:#71717a; font-family:monospace; text-align:center; }
  .radius-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:16px; }
  .radius-box { width:48px; height:48px; background:rgba(139,92,246,0.2); border:1px solid rgba(139,92,246,0.4); }
</style></head>
<body>
  <div class="row">
    <div class="item">
      <div class="box shadow-card" style="width:80px;height:60px;border-radius:20px;"></div>
      <div class="label">card shadow</div>
    </div>
    <div class="item">
      <div class="box shadow-hover" style="width:80px;height:60px;border-radius:20px;"></div>
      <div class="label">card hover</div>
    </div>
    <div class="item">
      <div class="box shadow-btn" style="width:80px;height:40px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);border:none;"></div>
      <div class="label">btn glow</div>
    </div>
  </div>
  <div class="radius-row">
    <div class="item"><div class="radius-box" style="border-radius:8px;"></div><div class="label">8px badge</div></div>
    <div class="item"><div class="radius-box" style="border-radius:12px;"></div><div class="label">12px input/btn</div></div>
    <div class="item"><div class="radius-box" style="border-radius:20px;"></div><div class="label">20px card</div></div>
    <div class="item"><div class="radius-box" style="border-radius:9999px;width:64px;height:32px;"></div><div class="label">pill btn</div></div>
    <div class="item"><div class="radius-box" style="border-radius:50%;width:48px;height:48px;background:linear-gradient(135deg,#a78bfa,#3b82f6);"></div><div class="label">avatar</div></div>
  </div>
</body></html>
