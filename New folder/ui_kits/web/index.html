<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SecureConnect — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #09090b;
      color: #f4f4f5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #09090b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="NavBar.jsx"></script>
  <script type="text/babel" src="AuthScreens.jsx"></script>
  <script type="text/babel" src="FeedScreen.jsx"></script>
  <script type="text/babel" src="MessagesScreen.jsx"></script>
  <script type="text/babel" src="NetworkScreen.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>

  <script type="text/babel">
    function App() {
      const [screen, setScreen] = React.useState('login');
      const [convFriend, setConvFriend] = React.useState(null);

      // Auth screens (no navbar)
      const authScreens = ['login', 'register', 'setup-otp', 'verify-otp'];
      const isAuth = authScreens.includes(screen);

      function renderScreen() {
        switch (screen) {
          case 'login':        return <LoginScreen setScreen={setScreen} />;
          case 'register':     return <RegisterScreen setScreen={setScreen} />;
          case 'setup-otp':    return <OTPSetupScreen setScreen={setScreen} />;
          case 'verify-otp':   return <OTPVerifyScreen setScreen={setScreen} />;
          case 'feed':         return <FeedScreen setScreen={setScreen} />;
          case 'my-posts':     return <MyPostsScreen setScreen={setScreen} />;
          case 'discover':     return <DiscoverScreen setScreen={setScreen} />;
          case 'messages':     return <MessagesScreen setScreen={setScreen} setConvFriend={setConvFriend} />;
          case 'conversation': return <ConversationScreen setScreen={setScreen} friend={convFriend} />;
          case 'network':      return <NetworkScreen setScreen={setScreen} setConvFriend={(f) => { setConvFriend(f); setScreen('conversation'); }} />;
          case 'profile':      return <ProfileScreen setScreen={setScreen} />;
          case 'key-rotate':   return <KeyRotateScreen setScreen={setScreen} />;
          default:             return <LoginScreen setScreen={setScreen} />;
        }
      }

      const unreadMsgs   = screen !== 'messages'     ? 2 : 0;
      const pendingCount = screen !== 'network'      ? 1 : 0;

      return (
        <div className="fade-in" key={screen}>
          {!isAuth && (
            <NavBar
              screen={screen}
              setScreen={setScreen}
              unreadMsgs={unreadMsgs}
              pendingCount={pendingCount}
            />
          )}
          {isAuth ? (
            <div style={{ minHeight: '100vh', background: '#09090b', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              {/* Auth header */}
              <div style={{ paddingTop: 40, marginBottom: 8, textAlign: 'center' }}>
                <div style={{
                  fontWeight: 800, fontSize: '1.6rem', letterSpacing: '-0.5px',
                  background: 'linear-gradient(135deg,#a78bfa,#3b82f6)',
                  WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                }}>
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="url(#authGrad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <defs>
                      <linearGradient id="authGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#a78bfa" />
                        <stop offset="100%" stopColor="#3b82f6" />
                      </linearGradient>
                    </defs>
                    <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                  SecureConnect
                </div>
                <p style={{ fontSize: '0.82rem', color: '#71717a', marginTop: 4 }}>End-to-end encrypted social platform</p>
              </div>
              <div style={{ width: '100%', maxWidth: 520, padding: '0 24px' }}>
                {renderScreen()}
              </div>
            </div>
          ) : (
            <div style={{ background: '#09090b', minHeight: 'calc(100vh - 60px)' }}>
              {renderScreen()}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
