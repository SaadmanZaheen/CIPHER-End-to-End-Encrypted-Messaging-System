{% extends "base.html" %}
{% block title %}Set Up 2FA — SecureConnect{% endblock %}
{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-sm-10 col-md-7 col-lg-6">
    <div class="card" style="border-color: rgba(184,79,255,0.2);">
      <div class="card-body p-4">
        <div class="text-center mb-4 pb-4" style="border-bottom: 1px solid rgba(255,255,255,0.07);">
          <span class="section-label" style="color: var(--violet); letter-spacing: 2px;">2FA SETUP</span>
          <h2 class="mt-2 mb-0">Two-Factor Auth</h2>
        </div>

        <p style="font-size: 0.875rem; color: var(--dim); margin-bottom: 1.25rem;">
          Scan this QR code with <strong style="color: var(--text);">Google Authenticator</strong> or any TOTP app:
        </p>

        <div class="d-flex justify-content-center mb-3">
          <div style="background: #fff; padding: 12px; border-radius: 4px; display: inline-block;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ otp_uri | urlencode }}"
                 alt="OTP QR Code" style="display: block;">
          </div>
        </div>

        <p style="font-size: 0.78rem; color: var(--dim); text-align: center; margin-bottom: 1.5rem;">
          Manual secret: <code>{{ otp_secret }}</code>
        </p>

        <hr>

        <p style="font-size: 0.875rem; color: var(--text); margin-bottom: 1rem; margin-top: 1.25rem;">
          Enter the 6-digit code to confirm setup:
        </p>
        <form method="POST" action="{{ url_for('auth.confirm_otp') }}">
          <div class="mb-3">
            <input type="text" name="token" class="form-control text-center"
                   maxlength="6" pattern="\d{6}" placeholder="000000" required autofocus
                   style="font-size: 1.6rem; letter-spacing: 0.6rem; text-align: center;">
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">Confirm &amp; Enable 2FA</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
