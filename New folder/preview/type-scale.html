<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; }
  .row { display:flex; flex-direction:column; gap:10px; }
  .specimen { display:flex; align-items:baseline; gap:16px; }
  .spec-label { font-size:10px; color:#71717a; font-family:monospace; width:80px; flex-shrink:0; }
  .hero   { font-size:2rem;   font-weight:800; letter-spacing:-1px;   line-height:1.2; }
  .h2     { font-size:1.75rem; font-weight:800; letter-spacing:-1px;  line-height:1.2; }
  .h3     { font-size:1.4rem;  font-weight:800; letter-spacing:-0.5px; }
  .h4     { font-size:1.25rem; font-weight:700; }
  .h5     { font-size:1.05rem; font-weight:600; }
  .body   { font-size:1rem;    font-weight:400; line-height:1.6; color:#f4f4f5; }
  .muted  { font-size:0.9rem;  font-weight:400; color:#a1a1aa; }
  .small  { font-size:0.8rem;  font-weight:500; color:#a1a1aa; }
  .xs     { font-size:0.7rem;  font-weight:600; letter-spacing:0.5px; color:#a1a1aa; }
</style></head>
<body>
<div class="row">
  <div class="specimen"><span class="spec-label">3xl / 800</span><span class="hero">Your Feed</span></div>
  <div class="specimen"><span class="spec-label">2xl / 800</span><span class="h2">Your Network</span></div>
  <div class="specimen"><span class="spec-label">xl / 800</span><span class="h3">SecureConnect</span></div>
  <div class="specimen"><span class="spec-label">lg / 700</span><span class="h4">Create secure post</span></div>
  <div class="specimen"><span class="spec-label">md / 600</span><span class="h5">Encrypted Content</span></div>
  <div class="specimen"><span class="spec-label">base / 400</span><span class="body">What's on your mind? This will be end-to-end encrypted...</span></div>
  <div class="specimen"><span class="spec-label">sm / 400</span><span class="muted">Connect with this user to unlock this post securely.</span></div>
  <div class="specimen"><span class="spec-label">xs / 600</span><span class="xs">MAC VALID · ECC VERIFIED · ECDH CHANNEL</span></div>
</div>
</body></html>
