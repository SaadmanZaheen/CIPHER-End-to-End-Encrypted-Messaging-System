<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .chip { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; flex:1; min-width:130px; }
  .dot { width:32px; height:32px; border-radius:8px; flex-shrink:0; }
  .name { font-size:12px; font-weight:600; }
  .hex  { font-size:10px; font-family:monospace; opacity:0.7; margin-top:2px; }
</style></head>
<body>
<div class="row">
  <div class="chip" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);">
    <div class="dot" style="background:#34d399;"></div>
    <div><div class="name" style="color:#34d399;">Success</div><div class="hex" style="color:#34d399;">#34d399</div></div>
  </div>
  <div class="chip" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);">
    <div class="dot" style="background:#f87171;"></div>
    <div><div class="name" style="color:#f87171;">Danger</div><div class="hex" style="color:#f87171;">#f87171</div></div>
  </div>
  <div class="chip" style="background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);">
    <div class="dot" style="background:#60a5fa;"></div>
    <div><div class="name" style="color:#60a5fa;">Info</div><div class="hex" style="color:#60a5fa;">#60a5fa</div></div>
  </div>
  <div class="chip" style="background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.3);">
    <div class="dot" style="background:#facc15;"></div>
    <div><div class="name" style="color:#facc15;">Warning</div><div class="hex" style="color:#facc15;">#facc15</div></div>
  </div>
  <div class="chip" style="background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);">
    <div class="dot" style="background:#8b5cf6;"></div>
    <div><div class="name" style="color:#a78bfa;">Primary</div><div class="hex" style="color:#a78bfa;">#8b5cf6</div></div>
  </div>
</div>
</body></html>
