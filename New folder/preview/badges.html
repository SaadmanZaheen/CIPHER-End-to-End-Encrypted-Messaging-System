<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:0.35em 0.75em; border-radius:8px;
    font-size:0.72rem; font-weight:600; letter-spacing:0.4px;
  }
  .b-success { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
  .b-danger  { background:rgba(239,68,68,0.15);  color:#f87171; border:1px solid rgba(239,68,68,0.3); }
  .b-info    { background:rgba(59,130,246,0.15);  color:#60a5fa; border:1px solid rgba(59,130,246,0.3); }
  .b-warning { background:rgba(234,179,8,0.15);   color:#facc15; border:1px solid rgba(234,179,8,0.3); }
  .b-primary { background:#8b5cf6; color:white; }
  .b-neutral { background:rgba(255,255,255,0.06); color:#a1a1aa; }
  .b-pill    { border-radius:9999px; }
</style></head>
<body>
  <div class="row">
    <span class="badge b-success">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      MAC Valid
    </span>
    <span class="badge b-primary">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      ECC ✔
    </span>
    <span class="badge b-danger">MAC ✘</span>
    <span class="badge b-info">RSA + ECC</span>
    <span class="badge b-warning">Platform Admin</span>
    <span class="badge b-neutral">Creator</span>
  </div>
  <div class="row">
    <span class="badge b-success b-pill">Connected</span>
    <span class="badge b-success" style="background:rgba(16,185,129,0.08);font-size:0.7rem;">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      Secure Channel
    </span>
    <span class="badge b-neutral">End-to-End Encrypted</span>
    <span class="badge b-danger b-pill">3 New</span>
    <span class="badge b-primary b-pill">2</span>
  </div>
</body></html>
