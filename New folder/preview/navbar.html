<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; margin:0; }
  nav {
    background:rgba(24,24,27,0.7);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.05);
    padding:0.9rem 0;
  }
  .nav-inner { max-width:900px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center; }
  .brand { font-weight:800; font-size:1.35rem; letter-spacing:-0.5px; background:linear-gradient(135deg,#a78bfa,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; display:flex; align-items:center; gap:8px; }
  .links { display:flex; gap:4px; align-items:center; }
  .link { font-size:0.9rem; font-weight:500; color:#a1a1aa; padding:0.45rem 0.9rem; border-radius:8px; text-decoration:none; white-space:nowrap; }
  .link.active { color:#f4f4f5; background:rgba(255,255,255,0.05); }
  .badge-dot { background:#ef4444; color:white; border-radius:9999px; font-size:0.68rem; font-weight:600; padding:1px 6px; margin-left:4px; }
  .logout { color:#f87171; font-weight:700; }
</style></head>
<body>
<nav>
  <div class="nav-inner">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
        <rect x="3" y="11" width="18" height="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      SecureConnect
    </div>
    <div class="links">
      <a class="link active" href="#">Feed</a>
      <a class="link" href="#">My Posts</a>
      <a class="link" href="#">Discover</a>
      <a class="link" href="#">Messages <span class="badge-dot">2</span></a>
      <a class="link" href="#">Network <span class="badge-dot">1</span></a>
      <a class="link" href="#">Profile</a>
      <a class="link logout" href="#">Logout</a>
    </div>
  </div>
</nav>
</body></html>
