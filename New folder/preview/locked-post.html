<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; }
  .card {
    background:#18181b; border:1px solid rgba(255,255,255,0.04);
    border-radius:20px; overflow:hidden; width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2); position:relative;
  }
  .blurred-title { font-size:1rem; font-weight:700; filter:blur(5px); opacity:0.5; padding:16px 20px 6px; }
  .blurred-text { font-size:0.88rem; color:#a1a1aa; filter:blur(8px); opacity:0.3; padding:0 20px 20px; line-height:1.6; user-select:none; }
  .overlay {
    position:absolute; inset:40px 12px 12px;
    background:rgba(24,24,27,0.75);
    border:1px solid rgba(255,255,255,0.05);
    backdrop-filter:blur(12px); border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px;
  }
  .lock-icon { margin-bottom:10px; color:#8b5cf6; }
  .overlay-title { font-weight:700; font-size:0.95rem; margin-bottom:6px; }
  .overlay-sub { font-size:0.78rem; color:#a1a1aa; line-height:1.5; margin-bottom:14px; }
  .btn-unlock { background:linear-gradient(135deg,#8b5cf6,#3b82f6); border:none; border-radius:9999px; color:white; font-weight:600; padding:0.45rem 1.3rem; font-size:0.85rem; cursor:pointer; font-family:inherit; box-shadow:0 4px 12px rgba(124,58,237,0.35); }
</style></head>
<body>
  <div class="card">
    <div class="blurred-title">Encrypted Post Title</div>
    <div class="blurred-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam quis nostrud exercitation.</div>
    <div class="overlay">
      <div class="lock-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <div class="overlay-title">Encrypted Content</div>
      <div class="overlay-sub">Connect with this user to unlock this post securely.</div>
      <button class="btn-unlock">Connect to Unlock</button>
    </div>
  </div>
</body></html>
