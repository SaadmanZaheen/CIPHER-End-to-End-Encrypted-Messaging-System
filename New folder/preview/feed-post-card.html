<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; }

  .card {
    background:#18181b; border:1px solid rgba(139,92,246,0.3);
    border-radius:20px; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2), 0 0 20px rgba(139,92,246,0.1);
    width:300px;
  }
  .card-body { padding:18px 20px; }
  .compose-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#a78bfa,#3b82f6); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; font-size:0.95rem; }
  .compose-label { font-weight:600; font-size:0.95rem; }
  .fake-input { background:transparent; border:none; border-bottom:none; color:#71717a; font-size:1rem; font-family:inherit; padding:4px 0; width:100%; display:block; margin-bottom:8px; pointer-events:none; }
  .fake-textarea { color:#71717a; font-size:0.9rem; font-family:inherit; width:100%; line-height:1.5; }
  hr { border-color:rgba(255,255,255,0.08); margin:12px 0; }
  .footer-row { display:flex; justify-content:space-between; align-items:center; }
  .toggle-label { font-size:0.78rem; color:#a1a1aa; display:flex; align-items:center; gap:6px; }
  .badge-inline { background:rgba(139,92,246,0.2); color:#a78bfa; font-size:0.68rem; font-weight:600; padding:2px 7px; border-radius:4px; }
  .toggle-pill { width:38px; height:18px; background:#8b5cf6; border-radius:9999px; position:relative; }
  .toggle-pill::after { content:''; position:absolute; width:12px; height:12px; background:white; border-radius:50%; top:3px; right:3px; }
  .btn-pill { background:linear-gradient(135deg,#8b5cf6,#3b82f6); border:none; border-radius:9999px; color:white; font-weight:600; padding:0.4rem 1.2rem; font-size:0.85rem; cursor:pointer; font-family:inherit; box-shadow:0 4px 12px rgba(124,58,237,0.35); }
</style></head>
<body>
  <div class="card">
    <div class="card-body">
      <div class="compose-header">
        <div class="avatar">Y</div>
        <div class="compose-label">Create secure post</div>
      </div>
      <input class="fake-input" type="text" value="Post Title" readonly>
      <div class="fake-textarea">What's on your mind? This will be end-to-end encrypted...</div>
      <hr>
      <div class="footer-row">
        <div class="toggle-label">
          <div class="toggle-pill"></div>
          <span class="badge-inline">RSA + ECC</span> E2E Encryption
        </div>
        <button class="btn-pill">Post securely</button>
      </div>
    </div>
  </div>
</body></html>
