<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:20px 24px; }
  .grid { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
  .tok { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:rgba(139,92,246,0.5); border-radius:4px; width:100%; }
  .name { font-size:10px; color:#71717a; font-family:monospace; }
  .val  { font-size:9px;  color:#a1a1aa; font-family:monospace; }
</style></head>
<body>
<div class="grid">
  <div class="tok"><div class="bar" style="height:4px;"></div><div class="name">--space-1</div><div class="val">4px</div></div>
  <div class="tok"><div class="bar" style="height:8px;"></div><div class="name">--space-2</div><div class="val">8px</div></div>
  <div class="tok"><div class="bar" style="height:12px;"></div><div class="name">--space-3</div><div class="val">12px</div></div>
  <div class="tok"><div class="bar" style="height:16px;"></div><div class="name">--space-4</div><div class="val">16px</div></div>
  <div class="tok"><div class="bar" style="height:20px;"></div><div class="name">--space-5</div><div class="val">20px</div></div>
  <div class="tok"><div class="bar" style="height:24px;"></div><div class="name">--space-6</div><div class="val">24px</div></div>
  <div class="tok"><div class="bar" style="height:32px;"></div><div class="name">--space-8</div><div class="val">32px</div></div>
  <div class="tok"><div class="bar" style="height:64px;"></div><div class="name">--space-16</div><div class="val">64px</div></div>
</div>
</body></html>
