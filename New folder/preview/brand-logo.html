<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#09090b; color:#f4f4f5; padding:28px 32px; display:flex; align-items:center; gap:40px; }
  .brand-large { display:flex; align-items:center; gap:10px; }
  .brand-text-lg { font-size:2rem; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg,#a78bfa,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .brand-small { display:flex; align-items:center; gap:6px; }
  .brand-text-sm { font-size:1.35rem; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(135deg,#a78bfa,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .divider { width:1px; height:48px; background:rgba(255,255,255,0.08); }
  .note { font-size:0.75rem; color:#71717a; line-height:1.6; max-width:180px; }
</style></head>
<body>
  <div class="brand-large">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
      <rect x="3" y="11" width="18" height="11" rx="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <span class="brand-text-lg">SecureConnect</span>
  </div>
  <div class="divider"></div>
  <div class="brand-small">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
      <rect x="3" y="11" width="18" height="11" rx="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <span class="brand-text-sm">SecureConnect</span>
  </div>
  <div class="divider"></div>
  <div class="note">Lock icon + wordmark. Gradient: violet-400 → blue-500 (135°). Font: Inter 800. No separate logo file — always inline SVG + text.</div>
</body></html>
